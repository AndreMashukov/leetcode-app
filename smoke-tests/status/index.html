<style>
:root {
  --bg: #0f1115;
  --panel: #181b22;
  --border: #252a35;
  --text: #e7eaef;
  --muted: #8b95a7;
  --accent: #4a9eff;
  --pass: #2ecc71;
  --fail: #e74c3c;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 32px;
  max-width: 960px;
}
h1 {
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 4px 0;
}
.subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
}
.controls {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 16px;
}
button {
  background: var(--accent);
  color: #fff;
  border: 0;
  border-radius: 4px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
.summary {
  margin-top: 16px;
  font-size: 14px;
  font-weight: 600;
}
.results { margin-top: 16px; }
.row {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 8px;
  font-size: 13px;
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 12px;
  align-items: center;
}
.row.pass { border-left: 3px solid var(--pass); }
.row.fail { border-left: 3px solid var(--fail); }
.row .status { font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: var(--muted); }
.row .body {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  white-space: pre-wrap;
  word-break: break-all;
}
.row .label { font-weight: 500; }
.icon { font-size: 16px; }
.summary.pass { color: var(--pass); }
.summary.fail { color: var(--fail); }
</style>
</head>

async function call(path, token) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const resp = await fetch(BASE + path, { headers, method: "GET" });
  const body = await resp.text();
  let parsed; try { parsed = JSON.parse(body); } catch { parsed = body; }
  return { status: resp.status, body: parsed };
}

const cases = [
  { name: "GET /health (JWT-protected)",
    fn: () => call("/health", TOK1),
    assert: ({status, body}) =>
      status === 200 && body?.ok === true && body?.service === "leetcode-status-bff" },
  { name: "GET /health without JWT",
    fn: () => call("/health"),
    assert: ({status}) => status === 401 },
  { name: "GET /submissions/{bogus}/status",
    fn: () => call(`/submissions/${BOGUS_SUB}/status`, TOK1),
    assert: ({status, body}) =>
      status === 404 && body?.error === "not_found" },
  { name: "GET /submissions/{real}/status (owner)",
    fn: () => call(`/submissions/${REAL_SUB}/status`, TOK1),
    assert: ({status, body}) =>
      status === 200 &&
      body?.submissionId === REAL_SUB &&
      body?.status === "PENDING" &&
      !!body?.submittedAt &&
      !("resultSummary" in body) },
  { name: "GET /submissions/{real}/status (other user — must be 404)",
    fn: () => call(`/submissions/${REAL_SUB}/status`, TOK2),
    assert: ({status, body}) =>
      status === 404 && body?.error === "not_found" },
  { name: "GET /submissions/bad!chars/status",
    fn: () => call(`/submissions/${BAD_SUB}/status`, TOK1),
    assert: ({status, body}) =>
      status === 400 && body?.error === "bad_request" },
];

const $btn = document.getElementById("run");
const $results = document.getElementById("results");
const $summary = document.getElementById("summary");

async function run() {
  $btn.disabled = true;
  $results.innerHTML = "";
  $summary.textContent = "Running…";
  $summary.className = "summary";
  let pass = 0, fail = 0;
  for (const c of cases) {
    const r = await c.fn();
    const ok = c.assert(r);
    if (ok) pass++; else fail++;
    const row = document.createElement("div");
    row.className = "row " + (ok ? "pass" : "fail");
    row.innerHTML = `
      <div class="icon">${ok ? "✓" : "✗"}</div>
      <div>
        <div class="label">${c.name}</div>
        <div class="body">${JSON.stringify(r.body)}</div>
      </div>
      <div class="status">${r.status}</div>`;
    $results.appendChild(row);
  }
  $summary.textContent = `${pass} pass / ${fail} fail`;
  $summary.className = "summary " + (fail === 0 ? "pass" : "fail");
  $btn.disabled = false;
}

$btn.addEventListener("click", run);
run();
